name: CI

on:
  push:
    branches: [main, refactor/split-monolith]
  pull_request:
    branches: [main, refactor/split-monolith]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: HTML validate
        run: npm run lint:html

      - name: ESLint
        run: npm run lint:js

  lighthouse:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lighthouse CI
        run: npm run lhci
