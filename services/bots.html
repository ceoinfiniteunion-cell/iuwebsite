/* HERO PARTICLES */
(function(){
  const c=document.getElementById('heroCanvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const pts=Array.from({length:60},()=>({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(212,0,0,.25)';ctx.fill();});
    pts.forEach((p,i)=>pts.slice(i+1).forEach(q=>{const d=Math.hypot(p.x-q.x,p.y-q.y);if(d<120){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle=`rgba(212,0,0,${.08*(1-d/120)})`;ctx.lineWidth=.5;ctx.stroke();}}));
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;},{passive:true});
})();

/* REVEAL */
const ro=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('v');ro.unobserve(e.target);}});},{threshold:.12});
document.querySelectorAll('.rev,.rev-l,.rev-r').forEach(el=>ro.observe(el));

/* PROCESS SEQUENTIAL */
const pl=document.getElementById('processList');
if(pl){
  const po=new IntersectionObserver(es=>{
    if(es[0].isIntersecting){
      pl.classList.add('animated');
      const steps=pl.querySelectorAll('.process-step');
      steps.forEach((s,i)=>setTimeout(()=>s.classList.add('lit'),i*300));
      po.disconnect();
    }
  },{threshold:.3});
  po.observe(pl);
}

/* COUNT UP STATS */
(function(){
  const nums = document.querySelectorAll('.hero-stat-num[data-count]');
  if(!nums.length) return;
  const ease = t => t<.5 ? 2*t*t : -1+(4-2*t)*t;
  const animateCount = (el) => {
    const target = parseInt(el.dataset.count, 10);
    if(target === 0) return;
    const suffix = el.querySelector('span');
    const suffixText = suffix ? suffix.outerHTML : '';
    const duration = 1800;
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start) / duration, 1);
      const val = Math.round(ease(p) * target);
      el.innerHTML = val.toLocaleString('uk-UA') + suffixText;
      if(p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  };
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        animateCount(e.target);
        obs.unobserve(e.target);
      }
    });
  }, {threshold: 0.5});
  nums.forEach(el => obs.observe(el));
})();
